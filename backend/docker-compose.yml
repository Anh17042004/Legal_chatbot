version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: legal_ai_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_network


volumes:
  postgres_data:

networks:
  ai_network:
    driver: bridge
